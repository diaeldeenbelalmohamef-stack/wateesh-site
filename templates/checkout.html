<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WATEESH | إتمام الشراء</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #e8491d;
            --dark-bg: #1a1a2e;
            --card-bg: #16213e;
            --text-color: #e9ecef;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        /* تنسيق القائمة العلوية */
        nav {
            text-align: center;
            background: var(--card-bg);
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        nav a {
            color: var(--text-color);
            font-weight: bold;
            margin: 0 15px;
            text-decoration: none;
            transition: 0.3s;
        }

        nav a:hover { color: var(--primary-color); }

        .checkout-container {
            max-width: 600px;
            margin: 20px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 { color: var(--primary-color); text-align: center; margin-top: 0; }

        .order-summary {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            text-align: center;
            border: 1px solid rgba(232, 73, 29, 0.2);
        }

        .order-summary img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .form-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--primary-color); }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0f3460;
            color: white;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .confirm-btn {
            width: 100%;
            background: var(--primary-color);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Tajawal', sans-serif;
        }

        .confirm-btn:hover { background: #ff5722; transform: translateY(-2px); }

        footer { text-align: center; padding: 20px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>

    <nav>
        <a href="{{ url_for('home') }}">الرئيسية</a>
        <a href="{{ url_for('products') }}">تسوق الآن</a> 
        <a href="{{ url_for('show_products') }}">إدارة المعرض</a> 
        <a href="{{ url_for('contact') }}">تواصل معنا</a>
    </nav>

    <main class="checkout-container">
    <h2>إتمام عملية الشراء 🛒</h2>

    <div class="order-summary">
        <img src="{{ url_for('static', filename=product[3] if product[3] else 'default_product.png') }}" 
             alt="{{ product[1] }}" class="product-img">
        
        <h3>{{ product[1] }}</h3> <p>السعر الفردي: <span style="color: var(--primary-color); font-weight: bold;">{{ product[2] }} ج.س</span></p>
    </div>

    <form method="POST">
        <input type="hidden" name="subtotal" value="{{ product[2] }}">
        <input type="hidden" name="product_id" value="{{ product[0] }}">

        <div class="form-group">
            <label>الكمية:</label>
            <input type="number" name="quantity" value="1" min="1" required>
        </div>

        <div class="form-group">
            <label>الاسم الكامل:</label>
            <input type="text" name="name" placeholder="أدخل اسمك الثلاثي" required>
        </div>

        <div class="form-group">
            <label>رقم الهاتف:</label>
            <input type="tel" name="phone" placeholder="01xxxxxxxxx" required>
        </div>

        <div class="form-group">
            <label>طريقة الدفع:</label>
            <select name="payment">
                <option value="Cash">دفع عند الاستلام</option>
                <option value="Vodafone Cash">فودافون كاش</option>
                <option value="Bank Transfer">تحويل بنكي (بنكك)</option>
            </select>
        </div>

        <button type="submit" class="confirm-btn">تأكيد طلب الشراء ✅</button>
    </form>
    
    <p style="text-align: center; margin-top: 20px;">
        <a href="{{ url_for('products') }}" style="color: #888; text-decoration: none; font-size: 0.9em;">← العودة للمتجر</a>
    </p>
</main>

    <footer>
        <p>WATEESH 2026 - جميع الحقوق محفوظة</p>
    </footer>

</body>
</html>
