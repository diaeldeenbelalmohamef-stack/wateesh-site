<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا | WATEESH</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #e8491d;
            --dark-bg: #1a1a2e;
            --card-bg: #16213e;
            --text-color: #e9ecef;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            text-align: center;
            background: var(--card-bg);
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        nav a {
            color: var(--text-color);
            font-weight: bold;
            margin: 0 15px;
            text-decoration: none;
            transition: 0.3s;
        }

        nav a:hover { color: var(--primary-color); }

        .contact-container {
            max-width: 600px;
            margin: 50px auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        h2 { color: var(--primary-color); font-size: 2em; margin-bottom: 30px; }

        .info-item {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-right: 4px solid var(--primary-color);
            text-align: right;
            font-size: 1.1em;
        }

        .feedback-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #333;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #0f3460;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-family: 'Tajawal', sans-serif;
        }

        .submit-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            width: 100%;
            transition: 0.3s;
        }

        .submit-btn:hover { background: #ff5722; transform: translateY(-2px); }

        footer { margin-top: auto; padding: 30px; text-align: center; color: #666; }
    </style>
</head>
<body>

    <nav>
        <a href="{{ url_for('home') }}">الرئيسية</a>
        <a href="{{ url_for('products') }}">المتجر</a>
        <a href="{{ url_for('about') }}">من نحن</a>
    </nav>

    <div class="contact-container">
        <h2>تواصل مع الوتيشين 🤝</h2>
        
        <div class="info-item">📧 البريد: diaeldinbelalmohamef@gmail.com</div>
        <div class="info-item">📍 الموقع: كردفان الغرة - السودان</div>
        <div class="info-item">📞 هاتف: متاح عند الطلب</div>

        <div class="feedback-section">
            <h3 style="color: var(--primary-color);">أرسل لنا رأيك</h3>

        <form action="{{ url_for('contact') }}" method="POST">
                <label>تقييمك:</label>
            <input type="number" name="rating" min="1" max="5" required>
    
             <label>رأيك يهمنا:</label>
             <textarea name="feedback" required></textarea>
    
             <button type="submit">إرسال</button>
        </form>
        </div>

        <div style="margin-top: 30px;">
            <a href="{{ url_for('home') }}" style="color: #888; text-decoration: none; font-size: 0.9em;">← العودة للرئيسية</a>
        </div>
    </div>

    <footer>
        <p>WATEESH SITE 2026 | كردفان في القلب</p>
    </footer>

</body>
</html>
