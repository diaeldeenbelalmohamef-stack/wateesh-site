<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الميديا | WATEESH</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #e8491d;
            --dark-bg: #1a1a2e;
            --card-bg: #16213e;
            --text-color: #e9ecef;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0; padding: 20px;
        }
        nav { text-align: center; margin-bottom: 30px; }
        nav a {
            color: var(--primary-color);
            text-decoration: none; font-weight: bold;
            margin: 0 15px; border: 1px solid var(--primary-color);
            padding: 8px 20px; border-radius: 20px;
            transition: 0.3s;
        }
        nav a:hover { background: var(--primary-color); color: white; }
        .container { max-width: 800px; margin: auto; }
        section {
            background: var(--card-bg); padding: 25px;
            border-radius: 15px; margin-bottom: 25px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { text-align: center; color: var(--primary-color); margin-bottom: 30px; }
        h2 { color: var(--primary-color); font-size: 1.5rem; margin-bottom: 15px; }
        video, audio { width: 100%; margin-top: 15px; border-radius: 10px; border: 1px solid #333; }
        img { max-width: 100%; border-radius: 10px; margin-top: 15px; border: 2px solid var(--card-bg); }
        p { color: #aaa; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

    <nav>
        <a href="{{ url_for('home') }}">الرئيسية</a>
        <a href="{{ url_for('median') }}" style="background: var(--primary-color); color: white;">معرض الميديا</a>
    </nav>

    <div class="container">

        <h1>مكتبة وسائط WATEESH</h1>
<section  style="text-align: center;">
        <h2>🎥 معرض الميديا</h2>
    <div class="video-wrapper" style="max-width: 500px; margin: 0 auto; background: #000; border-radius: 12px; border: 3px solid var(--accent-color); overflow: hidden;">
        <video controls style="width: 100%; display: block;">
            <source src="{{ url_for('static', filename='video1.mp4') }}" type="video/mp4">
            متصفحك لا يدعم تشغيل الفيديو.
        </video>
    </div>
</section>
      
        <section> 
             <h2>🌳 ظلال التبلدي الوارفة</h2>
             <img src="{{ url_for('static', filename='Tabeldy .png') }}" alt="شجرةالتبلدي">
            <p>رمز الصمود والجمال في بلادي</p>
        </section>


        <section>
            <h2>🎶 ألحان خالدة - مزمار</h2>
            <audio controls>
                <source src="{{ url_for('static', filename='my-audio.mp3') }}" type="audio/mpeg">
                متصفحك لا يدعم تشغيل الصوت.
            </audio>
            <p>أنغام الموسيقار الراحل حافظ عبد الرحمن - لحن الأيام</p>
        </section>
    </div>

</body>
</html>
