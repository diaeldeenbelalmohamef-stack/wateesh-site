<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | WATEESH</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; direction: rtl; }
        .container { background: white; padding: 20px; border-radius: 10px; max-width: 700px; margin: auto; }
        .item { border-right: 5px solid #1a73e8; background: #fafafa; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 لوحة تحكم الإدارة</h1>
        
        <h3>الاستبيانات المستلمة:</h3>
        {% for item in surveys %}
            <div class="item">
                <strong>الرقم: {{ item.id }}</strong>
                <p>{{ item.feedback }}</p>
                <small>التاريخ: {{ item.created_at }}</small>
            </div>
        {% else %}
            <p>لا توجد استبيانات حالياً.</p>
        {% endfor %}

        <hr>
        <a href="{{ url_for('home') }}">العودة للرئيسية</a>
    </div>
</body>
</html>
