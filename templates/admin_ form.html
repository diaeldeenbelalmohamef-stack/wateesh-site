<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم WATEESH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #2c3e50 !important; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">WATEESH Admin Panel</span>
        <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm">تسجيل الخروج</a>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-12">
            <div class="card p-4">
                <h3 class="mb-4 text-primary">📊 نتائج استبيانات المستخدمين</h3>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>#</th>
                                <th>التقييم</th>
                                <th>الملاحظات</th>
                                <th>التاريخ والوقت</th>
                            </tr>
                        </thead>
                        <tbody>
    {% for survey in surveys %}
    <tr>
        <td>{{ survey['id'] }}</td>
        <td>
            <span class="badge {% if survey['rating'] == 'excellent' %} bg-success {% elif survey['rating'] == 'good' %} bg-primary {% else %} bg-secondary {% endif %}">
                {{ survey['rating'] }}
            </span>
        </td>
        <td>{{ survey['feedback'] }}</td>
        <td class="text-muted small">{{ survey['created_at'] }}</td>
    </tr>
    {% endfor %}
</tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
